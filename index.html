<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli - Delivery</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23f4a460'/><circle cx='50' cy='50' r='40' fill='%23e8c39e'/><circle cx='35' cy='40' r='6' fill='%23c0392b'/><circle cx='60' cy='35' r='5' fill='%23c0392b'/><circle cx='55' cy='60' r='7' fill='%23c0392b'/><circle cx='40' cy='65' r='4' fill='%23c0392b'/><circle cx='65' cy='50' r='5' fill='%232e7d32'/><circle cx='30' cy='55' r='4' fill='%232e7d32'/><circle cx='50' cy='45' r='3' fill='%23f39c12'/></svg>">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/modal-vertical-styles.css">
    <link rel="stylesheet" href="vendor/fontawesome/css/fontawesome.min.css">
    <link rel="stylesheet" href="vendor/fontawesome/css/solid.min.css">
</head>
<body>
    <div class="header">
        <a href="https://pizza.lovii.ru/" class="logo-link" data-no-replace>
            <div class="logo">
                <h1>Pizza Napoli</h1>
                <p class="site-description">Лучшая пицца в городе</p>
            </div>
        </a>
        <div class="header-actions">
            <div class="cart-mini" onclick="showCart()">
                <i class="fas fa-shopping-basket" style="color:#fff;"></i> <span id="cart-total">0 ₽</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <!-- Navigation will be inserted here -->
        </div>

        <div class="content" id="content">
            <!-- Products will be inserted here -->
        </div>
    </div>

    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <div class="burger-icon"></div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="mobile-sidebar-header">
            <h2 class="mobile-sidebar-title">🍕 Pizza Napoli</h2>
            <p class="mobile-sidebar-subtitle">Выберите категорию</p>
        </div>
        <div id="mobile-menu-content">
            <!-- Mobile menu will be inserted here -->
        </div>
        <!-- Theme Toggle in Mobile Menu -->
        <div class="mobile-theme-toggle">
            <button class="theme-toggle-mobile" id="mobileThemeToggle">
                <i class="fas fa-sun" id="mobileThemeIcon"></i>
                <span id="mobileThemeText">Светлая тема</span>
            </button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="cart-modal">
            <h2><i class="fas fa-shopping-basket" style="margin-right:8px; color:#fff;"></i>Ваша корзина</h2>
            <div id="cart-items"></div>
        </div>
    </div>

    <script src="js/config.js" defer></script>
    <script src="js/app-delivery.js" defer></script>
    <script>
        // Apply saved theme on load (mobile toggle переключает её ниже)
        const savedTheme = localStorage.getItem('pizzaTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Mobile Theme Toggle
        const mobileThemeToggle = document.getElementById('mobileThemeToggle');
        const mobileThemeIcon = document.getElementById('mobileThemeIcon');
        const mobileThemeText = document.getElementById('mobileThemeText');
        
        if (mobileThemeToggle) {
            mobileThemeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('pizzaTheme', newTheme);
                updateMobileThemeUI(newTheme);
            });
        }
        
        function updateMobileThemeUI(theme) {
            if (theme === 'dark') {
                mobileThemeIcon.className = 'fas fa-sun';
                mobileThemeText.textContent = 'Светлая тема';
            } else {
                mobileThemeIcon.className = 'fas fa-moon';
                mobileThemeText.textContent = 'Темная тема';
            }
        }
    </script>
</body>
</html>
