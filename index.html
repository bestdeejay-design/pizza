<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli - Delivery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== DARK THEME (default) ===== */
        :root {
            --color-primary: #ff2e55;
            --color-primary-hover: #ff1a44;
            --color-primary-active: #e60033;
            --color-primary-light: rgba(255, 46, 85, 0.1);
            --gradient-primary: linear-gradient(135deg, #ff2e55 0%, #ff6b6b 100%);
            
            --color-bg-dark: #1A1A1A;
            --color-bg-card: #242424;
            --color-bg-card-hover: #2C2C2C;
            --glass-dark: rgba(36, 36, 36, 0.7);
            --border-subtle: #2A2A2A;
            --border-strong: #404040;
            
            --color-text-primary: #E8D5C4;
            --color-text-secondary: #DDCBB8;
            --color-text-heading: #F5EBE0;
            --color-text-inverse: #1A1A1A;
            
            --shadow-glow: 0 4px 20px rgba(255, 46, 85, 0.25);
            --shadow-card: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 46, 85, 0.1);
            --shadow-card-hover: 0 25px 40px -15px rgba(255, 46, 85, 0.35), 0 0 0 1px rgba(255, 46, 85, 0.2);
            --gradient-hero: linear-gradient(145deg, #1A1A1A 0%, #2A1A1F 50%, #1A1A1A 100%);
        }

        /* ===== LIGHT THEME ===== */
        [data-theme="light"] {
            --color-bg-dark: #FCF8F3;
            --color-bg-card: rgba(255, 255, 255, 0.85);
            --color-bg-card-hover: rgba(255, 255, 255, 0.95);
            --glass-dark: rgba(255, 255, 255, 0.6);
            
            --border-subtle: rgba(255, 46, 85, 0.15);
            --border-strong: rgba(255, 46, 85, 0.3);
            
            --color-text-primary: #2E2A27;
            --color-text-secondary: #5F5A57;
            --color-text-heading: #1F1B18;
            --color-text-inverse: #FFFFFF;
            
            --color-primary-light: rgba(255, 46, 85, 0.2);
            
            --shadow-glow: 0 8px 25px rgba(255, 46, 85, 0.25);
            --shadow-card: 0 15px 35px -12px rgba(0, 0, 0, 0.1),
                           0 0 0 1px rgba(255, 46, 85, 0.1),
                           inset 0 1px 0 rgba(255,255,255,0.6);
            --shadow-card-hover: 0 25px 40px -15px rgba(255, 46, 85, 0.35),
                                 0 0 0 1px rgba(255, 46, 85, 0.3),
                                 inset 0 1px 0 rgba(255,255,255,0.8);
            --gradient-hero: linear-gradient(125deg, 
                rgba(255,255,255,0.9) 0%, 
                rgba(255,245,250,0.9) 40%, 
                rgba(255,255,255,0.9) 100%);
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--color-bg-dark);
            color: var(--color-text-primary);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.2s;
        }

        /* Header */
        .header {
            background: var(--color-bg-card);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: nowrap;
        }

        .search-mini {
            padding: 10px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            font-size: 14px;
            width: 280px;
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            transition: all 0.3s;
        }

        .search-mini:focus {
            outline: none;
            border-color: var(--color-primary);
            width: 320px;
        }

        .cart-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--color-primary);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: var(--shadow-glow);
        }

        .cart-mini:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 46, 85, 0.45);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--color-bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 10px 16px;
            cursor: pointer;
            color: var(--color-text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-card);
            transition: 0.3s;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: scale(1.02);
        }

        .theme-toggle i {
            font-size: 16px;
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: var(--color-bg-card);
            padding: 30px 20px;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
            transition: all 0.3s;
        }

        .nav-category {
            padding: 14px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 15px;
            color: var(--color-text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-category:hover {
            background: var(--color-bg-card-hover);
            color: var(--color-text-heading);
        }

        .nav-category.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .nav-count {
            background: rgba(0,0,0,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .nav-category.active .nav-count {
            background: rgba(255,255,255,0.3);
        }

        /* Content Area */
        .content {
            padding: 40px;
        }

        .category-section {
            margin-bottom: 60px;
        }

        .category-header {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-text-heading);
            margin-bottom: 8px;
        }

        .category-subtitle {
            font-size: 15px;
            color: var(--color-text-secondary);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .product-card {
            background: var(--color-bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-card);
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-card-hover);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: var(--color-bg-card-hover);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-text-heading);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-description {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
            min-height: 36px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--color-primary);
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-glow);
        }

        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 46, 85, 0.45);
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--gradient-primary);
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 30px rgba(255, 46, 85, 0.4);
            align-items: center;
            justify-content: center;
        }

        .burger-icon {
            width: 24px;
            height: 2px;
            background: white;
            position: relative;
        }

        .burger-icon:before,
        .burger-icon:after {
            content: '';
            position: absolute;
            width: 24px;
            height: 2px;
            background: white;
            transition: 0.3s;
        }

        .burger-icon:before {
            top: -7px;
        }

        .burger-icon:after {
            bottom: -7px;
        }

        .mobile-menu-btn.active .burger-icon {
            background: transparent;
        }

        .mobile-menu-btn.active .burger-icon:before {
            top: 0;
            transform: rotate(45deg);
        }

        .mobile-menu-btn.active .burger-icon:after {
            bottom: 0;
            transform: rotate(-45deg);
        }

        .mobile-sidebar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh; /* Dynamic viewport height для мобильных */
            min-height: -webkit-fill-available; /* Для iOS Safari */
            background: var(--color-bg-dark);
            z-index: 999;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); /* Учет safe area для iPhone */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
        }

        .mobile-sidebar.active {
            display: block;
        }

        .mobile-sidebar-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .mobile-sidebar-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--color-text-heading);
            margin-bottom: 8px;
        }

        .mobile-sidebar-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .mobile-nav-group {
            margin-bottom: 24px;
        }

        .mobile-group-title {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .mobile-nav-category {
            padding: 14px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 15px;
            color: var(--color-text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-nav-category:hover {
            background: var(--color-bg-card);
            color: var(--color-text-heading);
        }

        .mobile-nav-category.active {
            background: var(--gradient-primary);
            color: white;
        }

        .mobile-nav-count {
            background: rgba(0,0,0,0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .mobile-nav-category.active .mobile-nav-count {
            background: rgba(255,255,255,0.3);
        }

        .mobile-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 16px 0;
        }

        /* Cart Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .cart-modal {
            background: var(--color-bg-card);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .cart-modal h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--color-text-heading);
            margin-bottom: 24px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .cart-actions {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 46, 85, 0.45);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--border-strong);
            color: var(--color-text-heading);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .header {
                padding: 12px 16px;
            }
            
            /* Скрываем кнопку темы в хедере на мобильном - она есть в меню */
            .theme-toggle {
                display: none !important;
            }
            
            /* Уменьшаем логотип и поиск */
            .logo h1 {
                font-size: 20px;
            }
            
            .search-mini {
                width: 180px;
                padding: 8px 12px;
                font-size: 13px;
            }
            
            .search-mini:focus {
                width: 220px;
            }
            
            .cart-mini {
                padding: 8px 14px;
                font-size: 13px;
            }

            .content {
                padding: 16px;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .category-title {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) and (min-width: 361px) {
            .logo h1 {
                font-size: 18px;
            }
            
            .search-mini {
                width: 150px;
            }
            
            .search-mini:focus {
                width: 180px;
            }
            
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .product-image-wrapper {
                height: 120px;
            }

            .product-name {
                font-size: 15px;
            }

            .product-description {
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            .header {
                padding: 10px 12px;
            }
            
            .logo h1 {
                font-size: 16px;
            }
            
            .search-mini {
                width: 120px;
                padding: 6px 10px;
                font-size: 12px;
            }
            
            .search-mini:focus {
                width: 140px;
            }
            
            .cart-mini {
                padding: 6px 10px;
                font-size: 12px;
            }
            
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .product-image-wrapper {
                height: 100px;
            }

            .product-name {
                font-size: 14px;
            }

            .product-description {
                font-size: 11px;
            }

            .add-btn {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }
        
        /* Улучшения для больших экранов */
        @media (min-width: 1081px) {
            .header {
                padding: 18px 40px;
            }
            
            .search-mini {
                width: 320px;
            }
            
            .search-mini:focus {
                width: 380px;
            }
            
            .content {
                padding: 50px 40px;
            }
        }

        /* Lazy Load More Button */
        .load-more-btn {
            padding: 14px 40px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: var(--shadow-glow);
        }

        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 46, 85, 0.45);
        }

        /* Contacts Grid */
        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .contact-card {
            background: var(--color-bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-card-hover);
        }

        .contact-card-lazy {
            background: var(--color-bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 0;
            box-shadow: var(--shadow-card);
            transition: all 0.3s;
            overflow: hidden;
        }

        .contact-card-lazy:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-card-hover);
        }

        .contact-card-lazy .product-info {
            padding: 20px;
        }

        .opening-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #4ADE80 0%, #22C55E 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Pizza Napoli</h1>
        </div>
        <div class="header-actions">
            <input type="text" class="search-mini" placeholder="Поиск блюд...">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun" id="themeIcon"></i>
                <span id="themeText">Светлая</span>
            </button>
            <div class="cart-mini" onclick="showCart()">
                🛒 <span id="cart-total">0 ₽</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <!-- Navigation will be inserted here -->
        </div>

        <div class="content" id="content">
            <!-- Products will be inserted here -->
        </div>
    </div>

    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <div class="burger-icon"></div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="mobile-sidebar-header">
            <h2 class="mobile-sidebar-title">🍕 Pizza Napoli</h2>
            <p class="mobile-sidebar-subtitle">Выберите категорию</p>
        </div>
        <div id="mobile-menu-content">
            <!-- Mobile menu will be inserted here -->
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="cart-modal">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-actions">
                <button class="btn btn-secondary" onclick="hideCart()">Закрыть</button>
                <button class="btn btn-primary">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="js/app-delivery.js"></script>
    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        // Load saved theme
        const savedTheme = localStorage.getItem('pizzaTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('pizzaTheme', newTheme);
            updateThemeUI(newTheme);
        });
        
        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Светлая';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Темная';
            }
        }
    </script>
</body>
</html>
