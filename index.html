<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli - Delivery</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <a href="./" class="logo-link">
            <div class="logo">
                <h1>Pizza Napoli</h1>
                <p class="site-description">Лучшая пицца в городе</p>
            </div>
        </a>
        <div class="header-actions">
            <div class="cart-mini" onclick="showCart()">
                🛒 <span id="cart-total">0 ₽</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <!-- Navigation will be inserted here -->
        </div>

        <div class="content" id="content">
            <!-- Products will be inserted here -->
        </div>
    </div>

    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <div class="burger-icon"></div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="mobile-sidebar-header">
            <h2 class="mobile-sidebar-title">🍕 Pizza Napoli</h2>
            <p class="mobile-sidebar-subtitle">Выберите категорию</p>
        </div>
        <div id="mobile-menu-content">
            <!-- Mobile menu will be inserted here -->
        </div>
        <!-- Theme Toggle in Mobile Menu -->
        <div class="mobile-theme-toggle">
            <button class="theme-toggle-mobile" id="mobileThemeToggle">
                <i class="fas fa-sun" id="mobileThemeIcon"></i>
                <span id="mobileThemeText">Светлая тема</span>
            </button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="cart-modal">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-actions">
                <button class="btn btn-secondary" onclick="hideCart()">Закрыть</button>
                <button class="btn btn-primary">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="js/app-delivery.js"></script>
    <script>
        // Logo Click Handler - Reset to index and clear content
        const logoLink = document.querySelector('.logo-link');
        if (logoLink) {
            logoLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = '/pizza/';
                localStorage.removeItem('lastCategory'); // Сбрасываем состояние
                console.log('Reset to index page');
            });
        }
        
        // Theme Toggle (Desktop)
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        // Load saved theme
        const savedTheme = localStorage.getItem('pizzaTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Update desktop UI only if elements exist
        if (themeIcon && themeText) {
            updateThemeUI(savedTheme);
        }
        
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('pizzaTheme', newTheme);
                updateThemeUI(newTheme);
            });
        }
        
        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Светлая';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Темная';
            }
        }
        
        // Mobile Theme Toggle
        const mobileThemeToggle = document.getElementById('mobileThemeToggle');
        const mobileThemeIcon = document.getElementById('mobileThemeIcon');
        const mobileThemeText = document.getElementById('mobileThemeText');
        
        if (mobileThemeToggle) {
            mobileThemeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('pizzaTheme', newTheme);
                updateMobileThemeUI(newTheme);
            });
        }
        
        function updateMobileThemeUI(theme) {
            if (theme === 'dark') {
                mobileThemeIcon.className = 'fas fa-sun';
                mobileThemeText.textContent = 'Светлая тема';
            } else {
                mobileThemeIcon.className = 'fas fa-moon';
                mobileThemeText.textContent = 'Темная тема';
            }
        }
    </script>
</body>
</html>
