<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli - Delivery</title>
    <link rel="stylesheet" href="css/delivery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Pizza Napoli</h1>
        </div>
        <div class="header-actions">
            <input type="text" class="search-mini" placeholder="Поиск блюд...">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun" id="themeIcon"></i>
                <span id="themeText">Светлая</span>
            </button>
            <div class="cart-mini" onclick="showCart()">
                🛒 <span id="cart-total">0 ₽</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <!-- Navigation will be inserted here -->
        </div>

        <div class="content" id="content">
            <!-- Products will be inserted here -->
        </div>
    </div>

    <!-- Mobile Menu Button -->
    <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <div class="burger-icon"></div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="mobile-sidebar-header">
            <h2 class="mobile-sidebar-title">🍕 Pizza Napoli</h2>
            <p class="mobile-sidebar-subtitle">Выберите категорию</p>
        </div>
        <div id="mobile-menu-content">
            <!-- Mobile menu will be inserted here -->
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="cart-modal">
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-actions">
                <button class="btn btn-secondary" onclick="hideCart()">Закрыть</button>
                <button class="btn btn-primary">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script src="js/app-delivery.js"></script>
    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        // Load saved theme
        const savedTheme = localStorage.getItem('pizzaTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('pizzaTheme', newTheme);
            updateThemeUI(newTheme);
        });
        
        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Светлая';
            } else {
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Темная';
            }
        }
    </script>
</body>
</html>
