<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli - Accordion Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .back-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .back-btn {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(102,126,234,0.1);
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(102,126,234,0.2);
            transform: translateX(-3px);
        }

        .hero {
            background: transparent;
            color: white;
            padding: 50px 20px;
            text-align: center;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }

        .logo p {
            font-size: 18px;
            opacity: 0.95;
        }

        /* Search Bar */
        .search-container {
            max-width: 800px;
            margin: 0 auto 30px;
            padding: 0 20px;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            background: white;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            right: 35px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #667eea;
        }

        /* Accordion Container */
        .accordion-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .accordion-item {
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-item:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .accordion-header {
            padding: 24px 32px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            transition: all 0.3s;
        }

        .accordion-header:hover {
            background: linear-gradient(135deg, #f0f2f5 0%, #f8f9fa 100%);
        }

        .accordion-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .category-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .category-info h3 {
            font-size: 22px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .category-count {
            font-size: 14px;
            color: #718096;
        }

        .accordion-arrow {
            width: 40px;
            height: 40px;
            background: rgba(102,126,234,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #667eea;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-item.active .accordion-arrow {
            transform: rotate(180deg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .accordion-item.active .accordion-content {
            max-height: 3000px;
        }

        .products-wrapper {
            padding: 24px 32px 32px;
            background: white;
        }

        /* Product Grid inside Accordion */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102,126,234,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e9ecef;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .product-description {
            font-size: 14px;
            color: #718096;
            line-height: 1.5;
            margin-bottom: 12px;
            min-height: 42px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 2px solid #e9ecef;
        }

        .product-price {
            font-size: 22px;
            font-weight: 700;
            color: #667eea;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102,126,234,0.3);
        }

        /* Load More Button */
        .load-more {
            display: none;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .load-more:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(102,126,234,0.3);
        }

        /* Floating Cart */
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 28px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(102,126,234,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            z-index: 1000;
            transition: all 0.3s;
        }

        .cart-float:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(102,126,234,0.5);
        }

        .cart-badge {
            background: white;
            color: #667eea;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal-title {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 25px;
            text-align: center;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 2px solid #f8f9fa;
        }

        .close-modal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }

        .close-modal:hover {
            transform: scale(1.03);
        }

        @media (max-width: 768px) {
            .logo h1 {
                font-size: 36px;
            }

            .accordion-header {
                padding: 20px;
            }

            .products-wrapper {
                padding: 20px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="back-nav">
        <a href="index.html" class="back-btn">← На главную</a>
    </div>

    <div class="hero">
        <div class="logo">
            <h1>Pizza Napoli</h1>
            <p>Аккордеон меню с постепенным раскрытием</p>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Поиск блюд...">
    </div>

    <div class="accordion-container" id="accordion">
        <!-- Accordion items will be inserted here -->
    </div>

    <div class="cart-float" onclick="showCart()">
        🛒 <span>Корзина</span>
        <span class="cart-badge" id="cart-count">0</span>
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <h2 class="modal-title">Ваш заказ</h2>
            <div id="cart-items"></div>
            <button class="close-modal" onclick="hideCart()">Закрыть</button>
        </div>
    </div>

    <script src="js/app-accordion.js"></script>
</body>
</html>
