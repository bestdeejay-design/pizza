<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Napoli RSC — Премиум каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: #0a0a0a;
            color: #f5f5f5;
            overflow-x: hidden;
        }

        .back-nav {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .back-nav a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 16px;
        }

        .back-nav a:hover {
            color: #f0c43f;
            transform: translateX(-5px);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-indicator svg {
            width: 40px;
            height: 40px;
            fill: #d4af37;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .menu-section {
            max-width: 1600px;
            margin: 0 auto;
            padding: 100px 40px;
        }

        .section-title {
            text-align: center;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
        }

        .filter-btn {
            padding: 15px 30px;
            border: 1px solid rgba(212,175,55,0.3);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.4s;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            color: #0a0a0a;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212,175,55,0.4);
        }

        .search-box {
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .search-box input {
            width: 100%;
            padding: 20px 40px;
            border: 1px solid rgba(212,175,55,0.3);
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            color: #f5f5f5;
        }

        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            background: rgba(255,255,255,0.08);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.5s;
            backdrop-filter: blur(20px);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(212,175,55,0.5);
            box-shadow: 0 30px 80px rgba(212,175,55,0.3);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
            transition: transform 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 30px;
            position: relative;
            z-index: 1;
        }

        .product-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #f5f5f5;
            line-height: 1.4;
        }

        .product-price {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            display: block;
        }

        .add-to-cart {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.4s;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(212,175,55,0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(212,175,55,0.3);
            margin: 5% auto;
            padding: 40px;
            border-radius: 24px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close {
            position: absolute;
            right: 30px;
            top: 30px;
            font-size: 36px;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }

        .close:hover {
            color: #d4af37;
            transform: rotate(90deg);
        }

        .footer {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: rgba(255,255,255,0.6);
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid rgba(212,175,55,0.2);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 42px;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .filters {
                overflow-x: auto;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="back-nav">
        <a href="index.html">← На главную</a>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">PREMIUM COLLECTION</h1>
            <p class="hero-subtitle">333 позиции исключительного качества</p>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
    </section>

    <section class="menu-section" id="menu">
        <h2 class="section-title">ИЗЫСКАННОЕ МЕНЮ</h2>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="pizza-30cm">🍕 Пицца 30 см</button>
            <button class="filter-btn" data-filter="piccolo-20cm">🍕 Piccolo 20 см</button>
            <button class="filter-btn" data-filter="calzone">🥟 Кальцоне</button>
            <button class="filter-btn" data-filter="bread-focaccia">🍞 Хлеб</button>
            <button class="filter-btn" data-filter="sauce">🥫 Соусы</button>
            <button class="filter-btn" data-filter="rolls">🍣 Роллы</button>
            <button class="filter-btn" data-filter="combo">🎁 Комбо</button>
            <button class="filter-btn" data-filter="confectionery">🍰 Десерты</button>
            <button class="filter-btn" data-filter="beverages">🍹 Напитки</button>
            <button class="filter-btn" data-filter="frozen">❄️ Заморозка</button>
            <button class="filter-btn" data-filter="aromatic-oils">🫒 Масла</button>
            <button class="filter-btn" data-filter="masterclass">👨‍🍳 Мастер-класс</button>
            <button class="filter-btn" data-filter="franchise">💼 Франшиза</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск шедевров...">
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </section>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <span class="close" id="closeCart">&times;</span>
            <h2 style="margin-bottom: 30px; font-size: 36px; color: #d4af37;">Ваш заказ</h2>
            <div id="cartItems"></div>
            <div style="margin-top: 30px; padding-top: 30px; border-top: 2px solid rgba(212,175,55,0.3);">
                <p style="font-size: 28px; font-weight: 700; color: #d4af37;">Итого: <span id="cartTotal">0</span> ₽</p>
                <p style="color: rgba(255,255,255,0.7); margin-top: 15px; font-size: 16px;">До complimentary позиции: <span id="freeProgress">12</span></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Pizza Napoli RSC. Premium Collection. Все права защищены.</p>
    </footer>

    <script src="js/app-premium.js"></script>
</body>
</html>
