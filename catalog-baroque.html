<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicilian Baroque - Pizza Napoli</title>
    <link rel="stylesheet" href="css/app-baroque.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
            color: #f0e6d2;
            min-height: 100vh;
        }

        .back-nav {
            background: linear-gradient(90deg, #4a0e4e 0%, #6b1c6f 50%, #4a0e4e 100%);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 3px solid #d4af37;
        }

        .back-btn {
            color: #ffd700;
            text-decoration: none;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(212,175,55,0.1);
            border: 2px solid #d4af37;
            font-family: 'Cinzel', serif;
        }

        .back-btn:hover {
            background: rgba(212,175,55,0.3);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        .hero {
            background: linear-gradient(135deg, #2d1b4e 0%, #4a0e4e 50%, #1a1a2e 100%);
            color: #ffd700;
            padding: 100px 20px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .hero::before {
            content: '👑';
            position: absolute;
            font-size: 400px;
            opacity: 0.08;
            top: -150px;
            left: -100px;
            transform: rotate(-20deg);
        }

        .hero::after {
            content: '⚜️';
            position: absolute;
            font-size: 300px;
            opacity: 0.1;
            bottom: -100px;
            right: -50px;
        }

        .logo h1 {
            font-family: 'Cinzel', serif;
            font-size: 80px;
            background: linear-gradient(135deg, #ffd700 0%, #f0c43f 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            letter-spacing: 8px;
        }

        .logo p {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 5px;
            color: #f0e6d2;
            font-style: italic;
        }

        .filters {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);
            padding: 30px 20px;
            position: sticky;
            top: 60px;
            z-index: 99;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            border-bottom: 2px solid #d4af37;
        }

        .filter-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .filter-btn {
            padding: 14px 28px;
            border: 2px solid #d4af37;
            background: transparent;
            color: #ffd700;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3), transparent);
            transition: left 0.5s;
        }

        .filter-btn:hover::before {
            left: 100%;
        }

        .filter-btn:hover {
            background: rgba(212,175,55,0.2);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212,175,55,0.4);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            color: #1a1a2e;
            box-shadow: 0 0 30px rgba(212,175,55,0.6);
        }

        .search-container {
            max-width: 600px;
            margin: 25px auto 0;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 25px;
            border: 2px solid #d4af37;
            border-radius: 5px;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            color: #ffd700;
            font-family: 'Cormorant Garamond', serif;
        }

        .search-input:focus {
            outline: none;
            border-color: #f0c43f;
            box-shadow: 0 0 25px rgba(212,175,55,0.3);
            background: rgba(255,255,255,0.08);
        }

        .search-input::placeholder {
            color: rgba(240,230,210,0.5);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #d4af37;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 35px;
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 20px 40px;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(45,27,78,0.8) 0%, rgba(26,26,46,0.9) 100%);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.4s;
            border: 2px solid rgba(212,175,55,0.3);
            position: relative;
        }

        .product-card::before {
            content: '✦';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: #d4af37;
            opacity: 0.5;
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 60px rgba(212,175,55,0.3);
            border-color: #d4af37;
        }

        .product-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: linear-gradient(135deg, #2d1b4e 0%, #4a0e4e 100%);
            border-bottom: 3px solid rgba(212,175,55,0.3);
        }

        .product-info {
            padding: 28px;
        }

        .product-title {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .product-description {
            font-size: 15px;
            color: #f0e6d2;
            line-height: 1.7;
            margin-bottom: 18px;
            min-height: 51px;
            font-style: italic;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            border-top: 2px solid rgba(212,175,55,0.3);
        }

        .product-price {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700 0%, #f0c43f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            color: #1a1a2e;
            border: 2px solid #d4af37;
            padding: 14px 32px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(212,175,55,0.4);
        }

        .add-to-cart:hover {
            background: linear-gradient(135deg, #4a0e4e 0%, #6b1c6f 100%);
            color: #ffd700;
            border-color: #ffd700;
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(212,175,55,0.6);
        }

        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #4a0e4e 0%, #6b1c6f 100%);
            color: #ffd700;
            padding: 20px 32px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            font-size: 17px;
            font-family: 'Cinzel', serif;
            z-index: 1000;
            transition: all 0.3s;
            border: 3px solid #d4af37;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 8px 40px rgba(212,175,55,0.4); }
            50% { box-shadow: 0 8px 60px rgba(212,175,55,0.7); }
        }

        .cart-float:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 60px rgba(212,175,55,0.8);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,46,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);
            padding: 50px;
            border-radius: 10px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 80px rgba(212,175,55,0.4);
            border: 3px solid #d4af37;
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 48px;
            background: linear-gradient(135deg, #ffd700 0%, #f0c43f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 4px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 2px solid rgba(212,175,55,0.3);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .close-modal {
            background: linear-gradient(135deg, #d4af37 0%, #f0c43f 100%);
            color: #1a1a2e;
            border: 2px solid #d4af37;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 25px;
            width: 100%;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .close-modal:hover {
            background: linear-gradient(135deg, #4a0e4e 0%, #6b1c6f 100%);
            color: #ffd700;
            border-color: #ffd700;
            transform: scale(1.03);
        }

        @media (max-width: 768px) {
            .hero {
                padding: 70px 20px;
            }

            .logo h1 {
                font-size: 52px;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .filter-container {
                gap: 10px;
            }

            .filter-btn {
                padding: 12px 20px;
                font-size: 13px;
            }

            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="back-nav">
        <a href="index.html" class="back-btn">← На главную</a>
    </div>

    <div class="hero">
        <div class="logo">
            <h1>SICILIAN BAROQUE</h1>
            <p>Luxury Italian Dining Experience</p>
        </div>
    </div>

    <div class="filters">
        <div class="filter-container">
            <button class="filter-btn active" data-category="all">Все меню</button>
            <button class="filter-btn" data-category="pizza">Пицца</button>
            <button class="filter-btn" data-category="pasta">Паста</button>
            <button class="filter-btn" data-category="salads">Салаты</button>
            <button class="filter-btn" data-category="drinks">Напитки</button>
            <button class="filter-btn" data-category="desserts">Десерты</button>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Поиск изысканных блюд...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="products-grid" id="products"></div>

    <div class="cart-float" onclick="showCart()">
        👑 <span id="cart-count">0</span> товаров
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <h2 class="modal-title">Ваш заказ</h2>
            <div id="cart-items"></div>
            <button class="close-modal" onclick="hideCart()">Закрыть</button>
        </div>
    </div>

    <script src="js/app-baroque.js"></script>
</body>
</html>
