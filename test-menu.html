<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест меню</title>
</head>
<body>
    <h1>Тест загрузки меню</h1>
    <div id="result"></div>
    
    <script>
        fetch('menu-complete.json')
            .then(r => r.json())
            .then(data => {
                const count = Object.keys(data.menu).length;
                let totalProducts = 0;
                Object.values(data.menu).forEach(cat => totalProducts += cat.length);
                
                document.getElementById('result').innerHTML = `
                    <p style="color: green; font-size: 18px;">✅ JSON загружен успешно!</p>
                    <p>Категорий: <strong>${count}</strong></p>
                    <p>Товаров: <strong>${totalProducts}</strong></p>
                    <p>Первые 5 категорий:</p>
                    <ul>
                        ${Object.keys(data.menu).slice(0, 5).map(cat => 
                            `<li>${cat}: ${data.menu[cat].length} товаров</li>`
                        ).join('')}
                    </ul>
                `;
            })
            .catch(err => {
                document.getElementById('result').innerHTML = `
                    <p style="color: red; font-size: 18px;">❌ Ошибка: ${err.message}</p>
                `;
            });
    </script>
</body>
</html>
